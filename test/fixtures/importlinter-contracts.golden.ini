[importlinter]
root_packages =
    src

[importlinter:contract:1]
name = core may not import ui
type = forbidden
source_modules =
    src.core
forbidden_modules =
    src.ui

[importlinter:contract:2]
name = data may not import core, ui
type = forbidden
source_modules =
    src.data
forbidden_modules =
    src.core
    src.ui

[importlinter:contract:3]
name = ui may not import data
type = forbidden
source_modules =
    src.ui
forbidden_modules =
    src.data
